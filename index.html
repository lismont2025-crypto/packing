<!DOCTYPE html>
<html>
<head>

<title>Lismount Tex Packing List</title>

<style>

body{
font-family:Arial;
margin:40px;
}

.header{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

table,th,td{
border:1px solid black;
}

th,td{
padding:6px;
text-align:center;
}

input{
width:95%;
border:none;
text-align:center;
}

button{
margin-top:10px;
padding:8px 15px;
}

</style>

<script>

function addRow(){

var table=document.getElementById("table");
var row=table.insertRow();

row.innerHTML=
`
<td>${table.rows.length-1}</td>
<td><input></td>
<td><input class="piece" type="number" oninput="calculate()"></td>
<td><input class="meter" type="number" oninput="calculate()"></td>
<td><input></td>
`;

}

function calculate(){

var meters=document.querySelectorAll(".meter");
var pieces=document.querySelectorAll(".piece");

var meterTotal=0;
var pieceTotal=0;

meters.forEach(function(m){
meterTotal+=Number(m.value);
});

pieces.forEach(function(p){
pieceTotal+=Number(p.value);
});

document.getElementById("meterTotal").value=meterTotal;
document.getElementById("pieceTotal").value=pieceTotal;

}

</script>

</head>

<body>

<div class="header">

<h2>LISMOUNT TEX INDIA LLP</h2>
<h3>Packing List</h3>

</div>

Order No : <input><br><br>
Party Name : <input><br><br>
Delivery No : <input><br><br>
Date : <input type="date">

<table id="table">

<tr>
<th>S.No</th>
<th>Bale No</th>
<th>No Of Pieces</th>
<th>Bale Mtrs</th>
<th>Net Weight</th>
</tr>

<tr>
<td>1</td>
<td><input></td>
<td><input class="piece" type="number" oninput="calculate()"></td>
<td><input class="meter" type="number" oninput="calculate()"></td>
<td><input></td>
</tr>

</table>

<button onclick="addRow()">Add Bale</button>

<br><br>

<table>

<tr>
<th>Total Pieces</th>
<th>Total Meter</th>
</tr>

<tr>
<td><input id="pieceTotal" readonly></td>
<td><input id="meterTotal" readonly></td>
</tr>

</table>

<br><br>

<p style="text-align:right;">
For LISMOUNT TEX INDIA LLP<br><br>
Authorised Signatory
</p>

<button onclick="window.print()">Print Packing List</button>

</body>
</html>

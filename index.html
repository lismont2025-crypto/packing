<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lab Dip Approval</title>

<style>
@page {
    size: A4;
    margin: 10mm;
}

body {
    font-family: Arial, sans-serif;
}

.container {
    width: 100%;
    height: 100%;
    border: 2px solid black;
    padding: 10px;
    box-sizing: border-box;
}

.header {
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    color: red;
}

.title {
    text-align: center;
    font-size: 14px;
    margin-bottom: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

td {
    border: 1px solid black;
    padding: 6px;
    font-size: 12px;
}

.label {
    background: orange;
    width: 30%;
    font-weight: bold;
}

input {
    width: 100%;
    border: none;
    outline: none;
}

.box-area {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 120px);
    gap: 5px;
    margin-top: 10px;
}

.box {
    border: 1px solid black;
    position: relative;
}

.box span {
    position: absolute;
    bottom: 5px;
    left: 5px;
    font-size: 11px;
}

.footer {
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
    font-size: 12px;
}

.approved { color: green; font-weight: bold; }
.rejected { color: red; font-weight: bold; }

textarea {
    width: 200px;
    height: 40px;
    border: 1px solid black;
}

@media print {
    input, textarea {
        border: none;
    }
}
</style>

</head>

<body>

<div class="container">

    <div class="header">ESPRIT</div>
    <div class="title">COTTON SHEETING FABRICS LAB DIP FOR APPROVAL</div>

    <table>
        <tr>
            <td class="label">Buyer Name</td>
            <td><input type="text"></td>
        </tr>
        <tr>
            <td class="label">Supplier</td>
            <td><input type="text"></td>
        </tr>
        <tr>
            <td class="label">Quality</td>
            <td><input type="text"></td>
        </tr>
        <tr>
            <td class="label">Colour</td>
            <td><input type="text"></td>
        </tr>
        <tr>
            <td class="label">Date</td>
            <td><input type="date"></td>
        </tr>
    </table>

    <div class="box-area">
        <div class="box"><span>Lab Dip - A</span></div>
        <div class="box"><span>Lab Dip - B</span></div>
        <div class="box"><span>Lab Dip - C</span></div>
        <div class="box"><span>Lab Dip - D</span></div>
        <div class="box"><span>Lab Dip - E</span></div>
        <div class="box"><span>Lab Dip - F</span></div>
    </div>

    <div class="footer">
        <div>Checked By: <input type="text" style="width:120px;"></div>
        
        <div>
            <label><input type="radio" name="status"> <span class="approved">Approved</span></label>
            <label><input type="radio" name="status"> <span class="rejected">Rejected</span></label>
        </div>

        <div>
            Remarks:<br>
            <textarea></textarea>
        </div>
    </div>

</div>

</body>
</html>

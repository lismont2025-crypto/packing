<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lab Dip Approval</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
    }

    .container {
        width: 700px;
        margin: 20px auto;
        border: 2px solid #000;
        padding: 10px;
        background: #fff;
    }

    .header {
        text-align: center;
        font-weight: bold;
        font-size: 22px;
        color: red;
    }

    .title {
        text-align: center;
        font-size: 14px;
        margin-bottom: 10px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 10px;
    }

    td {
        border: 1px solid #000;
        padding: 5px;
        font-size: 12px;
    }

    .label {
        background-color: orange;
        font-weight: bold;
        width: 30%;
    }

    .box-area {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(2, 150px);
        gap: 5px;
        margin-top: 10px;
    }

    .box {
        border: 1px solid #000;
        position: relative;
    }

    .box span {
        position: absolute;
        bottom: 5px;
        left: 5px;
        font-size: 11px;
    }

    .footer {
        display: flex;
        justify-content: space-between;
        margin-top: 10px;
        font-size: 12px;
    }

    .approved {
        color: green;
        font-weight: bold;
    }

    .rejected {
        color: red;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="container">

    <div class="header">ESPRIT</div>
    <div class="title">COTTON SHEETING FABRICS LAB DIP FOR APPROVAL</div>

    <table>
        <tr>
            <td class="label">Buyer Name</td>
            <td></td>
        </tr>
        <tr>
            <td class="label">Supplier</td>
            <td></td>
        </tr>
        <tr>
            <td class="label">Quality</td>
            <td></td>
        </tr>
        <tr>
            <td class="label">Colour</td>
            <td></td>
        </tr>
        <tr>
            <td class="label">Date</td>
            <td></td>
        </tr>
    </table>

    <div class="box-area">
        <div class="box"><span>Lab Dip - A</span></div>
        <div class="box"><span>Lab Dip - B</span></div>
        <div class="box"><span>Lab Dip - C</span></div>
        <div class="box"><span>Lab Dip - D</span></div>
        <div class="box"><span>Lab Dip - E</span></div>
        <div class="box"><span>Lab Dip - F</span></div>
    </div>

    <div class="footer">
        <div>Checked By:</div>
        <div>
            <span class="approved">Approved</span> /
            <span class="rejected">Rejected</span>
        </div>
        <div>Remarks:</div>
    </div>

</div>

</body>
</html>

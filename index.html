<!DOCTYPE html>
<html>
<head>

<title>Lismount Tex Packing List</title>

<style>

body{
font-family:Arial;
margin:30px;
}

.header{
display:flex;
align-items:center;
gap:20px;
}

.logo{
height:80px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table,th,td{
border:1px solid black;
}

th,td{
padding:6px;
text-align:center;
}

input,select{
width:95%;
border:none;
text-align:center;
}

button{
margin-top:10px;
padding:8px 15px;
}

</style>

<script>

function challanNumber(){

var num=localStorage.getItem("challan");

if(!num){num=1;}

document.getElementById("challan").value=num;

localStorage.setItem("challan",Number(num)+1);

}

function addRow(){

var table=document.getElementById("table");
var row=table.insertRow();

row.innerHTML=
`
<td>${table.rows.length-1}</td>
<td><input></td>
<td><input class="piece" type="number" oninput="calculate()"></td>
<td><input class="meter" type="number" oninput="calculate()"></td>
<td><input></td>
`;

}

function calculate(){

var meters=document.querySelectorAll(".meter");
var pieces=document.querySelectorAll(".piece");

var meterTotal=0;
var pieceTotal=0;

meters.forEach(function(m){
meterTotal+=Number(m.value);
});

pieces.forEach(function(p){
pieceTotal+=Number(p.value);
});

document.getElementById("meterTotal").value=meterTotal;
document.getElementById("pieceTotal").value=pieceTotal;

}

</script>

</head>

<body onload="challanNumber()">

<div class="header">

<img src="logo.png" class="logo">

<div>
<h2>LISMOUNT TEX INDIA LLP</h2>
Packing List
</div>

</div>

<br>

Delivery Challan No :
<input id="challan" readonly>

<br><br>

Customer :

<select>

<option>AB TEX</option>
<option>RR FABRICS</option>
<option>SK GARMENTS</option>

</select>

<br><br>

Date :

<input type="date">

<table id="table">

<tr>
<th>S.No</th>
<th>Bale No</th>
<th>No Of Pieces</th>
<th>Bale Mtrs</th>
<th>Net Weight</th>
</tr>

<tr>
<td>1</td>
<td><input></td>
<td><input class="piece" type="number" oninput="calculate()"></td>
<td><input class="meter" type="number" oninput="calculate()"></td>
<td><input></td>
</tr>

</table>

<button onclick="addRow()">Add Bale</button>

<br><br>

<table>

<tr>
<th>Total Pieces</th>
<th>Total Meter</th>
</tr>

<tr>
<td><input id="pieceTotal" readonly></td>
<td><input id="meterTotal" readonly></td>
</tr>

</table>

<br><br>

<button onclick="window.print()">Download / Print PDF</button>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lismount Tex Login</title>
<style>
/* Body style */
body{
    margin:0;
    padding:0;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Login box */
.login-box{
    background: rgba(255,255,255,0.95);
    padding: 40px;
    width:350px;
    border-radius:15px;
    box-shadow: 0 15px 25px rgba(0,0,0,0.5);
    text-align:center;
    transition: 0.3s;
}

.login-box:hover{
    transform: scale(1.03);
}

/* Heading */
.login-box h2{
    margin:0 0 30px;
    padding:0;
    color:#333;
    font-size:28px;
    letter-spacing:2px;
}

/* Inputs */
.login-box input{
    width:80%;
    padding:12px 15px;
    margin:10px 0;
    border:none;
    background: #f0f0f0;
    border-radius: 5px;
    font-size:16px;
}

.login-box input:focus{
    outline:none;
    background:#e0e0e0;
}

/* Button */
.login-box button{
    width:85%;
    padding:12px;
    background: #0f2027;
    color:white;
    font-size:18px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    margin-top:15px;
    transition:0.3s;
}

.login-box button:hover{
    background:#2c5364;
}

/* Alert style */
.alert{
    color:red;
    font-size:14px;
    margin-top:10px;
    display:none;
}
</style>

<script>
function login(){
    var user=document.getElementById("username").value;
    var pass=document.getElementById("password").value;

    if(user=="admin" && pass=="1234"){
        window.location="index.html";
    } else {
        var alertBox = document.getElementById("alert");
        alertBox.style.display="block";
        alertBox.innerHTML="Wrong Login Details";
    }
}
</script>

</head>

<body>

<div class="login-box">
<h2>LISMOUNT TEX LOGIN</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="alert" id="alert"></div>
</div>

</body>
</html>
